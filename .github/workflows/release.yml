name: release

on:
  workflow_dispatch:
  #push:
  #  tags:
  #    - "v0.*"
  #    - "v1.*"

jobs:
  Build:
    name: build-binary
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Hello world
        run: uname -a

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'yarn'
          cache-dependency-path: 'web/yarn.lock'
      - name: Build web
        working-directory: web
        run: |
          yarn install
          yarn run build
      #      - uses: actions/setup-go@v4
      #        with:
      #          go-version: '1.20'
      #          cache-dependency-path: 'server/go.sum'

      - name: Set up QEMU
        # https://github.com/docker/setup-qemu-action
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre bash
        shell: bash
        run: |
          appVer=`cat version`
          commitId=`git rev-parse HEAD`
          echo "APP_VER=$appVer" >> $GITHUB_ENV
          echo "commitId=$commitId" >> $GITHUB_ENV

          echo $appVer > version_info
          echo $commitId >> version_info
          echo $GITHUB_REF >> version_info
          echo $GITHUB_REF_NAME >> version_info

          #cd server;go mod tidy

      - name: Build and export amd64 image
        uses: docker/build-push-action@v5
        with:
          load: true
          cache-from: type=gha,scope=anylink-amd64
          cache-to: type=gha,mode=max,scope=anylink-amd64
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            appVer=${{ env.APP_VER }}
            commitId=${{ env.commitId }}
          tags: anylink:${{ env.APP_VER }}-amd64

      - name: Build and export arm64 image
        uses: docker/build-push-action@v5
        with:
          load: true
          cache-from: type=gha,scope=anylink-arm64
          cache-to: type=gha,mode=max,scope=anylink-arm64
          context: .
          file: ./docker/Dockerfile
          platforms: linux/arm64
          build-args: |
            appVer=${{ env.APP_VER }}
            commitId=${{ env.commitId }}
          tags: anylink:${{ env.APP_VER }}-arm64

      - name: Prepare artifact directories
        shell: bash
        run: |
          rm -rf artifact-dist
          mkdir -p artifact-dist

      - name: Export and compress amd64 image
        shell: bash
        run: |
          appVer=${{ env.APP_VER }}
          docker save anylink:${appVer}-amd64 | gzip > artifact-dist/anylink-${appVer}-linux-amd64.tar.gz

      - name: Export and compress arm64 image
        shell: bash
        run: |
          appVer=${{ env.APP_VER }}
          docker save anylink:${appVer}-arm64 | gzip > artifact-dist/anylink-${appVer}-linux-arm64.tar.gz

      - name: List artifacts
        shell: bash
        run: ls -lh artifact-dist

      - name: Release
        # https://github.com/ncipollo/release-action
        # artifacts: bin/release/*
        # generateReleaseNotes: true
        # draft: true
        # https://github.com/softprops/action-gh-release
        uses: softprops/action-gh-release@v1
        #if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: v${{ env.APP_VER }}
          files: artifact-dist/*

